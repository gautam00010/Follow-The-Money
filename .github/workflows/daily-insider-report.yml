name: Daily Insider Purchases

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch insider purchases
        run: python scripts/fetch_insider_purchases.py
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
      - name: Commit updated report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update insider purchases report"
          file_pattern: daily_report.md
